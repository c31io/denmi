<h1 id="linear-map">Linear map</h1>
<p>For vector spaces <span class="math inline">\(V\)</span> and <span
class="math inline">\(W\)</span> over <a
href="../real_analysis/field.html">field</a> <span
class="math inline">\(K\)</span>, <span class="math inline">\(f: V
\rightarrow W\)</span> is a linear map if <span
class="math inline">\(\forall \mathbf u, \mathbf v\in V, \forall c \in
K\)</span> holds:</p>
<ul>
<li>Additivity: <span class="math inline">\(f(\mathbf u+ \mathbf v) =
f(\mathbf u) + f(\mathbf v)\)</span></li>
<li>Homogeneity: <span class="math inline">\(f(c \mathbf u) = c
f(\mathbf u)\)</span></li>
</ul>
